<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KÖSTEBEK ONLINE V16</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: #1a1a1a; border: 1px solid #333; border-radius: 25px; padding: 30px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 15px 45px rgba(0,0,0,0.7); }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #222; color: #fff; font-size: 1.1em; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        #player-list { text-align: left; margin: 20px 0; border-top: 1px solid #333; padding-top: 15px; }
        .p-card { background: #252525; padding: 12px; margin: 8px 0; border-radius: 10px; border-left: 5px solid var(--gold); display: flex; align-items: center; font-weight: bold; }
        .hidden { display: none !important; }
        .word-box { font-size: 2.3em; font-weight: bold; color: var(--gold); margin: 30px 0; padding: 30px; border: 3px dashed #444; border-radius: 20px; background: #111; }
        .status { color: var(--gold); font-size: 0.9em; animation: blink 1.5s infinite; margin-top: 15px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="box" id="lobby">
    <h1 style="color:var(--gold); margin-bottom: 5px; letter-spacing: 2px;">KÖSTEBEK</h1>
    <p style="color: #666; font-size: 0.8em; margin-top: 0;">FINAL VERSION 16.0</p>
    
    <div id="login-ui">
        <input type="number" id="roomInput" placeholder="ODA NO (Örn: 99)">
        <input type="text" id="nameInput" placeholder="ADINIZ">
        <button class="btn" onclick="connect()">ODAYA KATIL</button>
    </div>

    <div id="room-ui" class="hidden">
        <div style="font-size: 1.2em; margin-bottom: 10px;">ODA: <span id="room-id" style="color:var(--gold)">--</span></div>
        <div id="player-list"><b>Oyuncular:</b></div>
        <button class="btn hidden" id="start-btn" onclick="sendGameStart()">OYUNU BAŞLAT</button>
        <p class="status" id="status-text">Bağlantı aktif, diğerleri bekleniyor...</p>
    </div>
</div>

<div class="box hidden" id="game-ui">
    <h2 id="role-text" style="letter-spacing: 2px;">ROLÜN</h2>
    <div class="word-box" id="word-display">---</div>
    <button class="btn" onclick="location.reload()" style="background:#333; color:#fff">LOBİYE DÖN</button>
</div>

<script>
    // En stabil çalışan açık veritabanı
    const config = { databaseURL: "https://gafil-kostebek-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myName, myRoom, players = [];
    const pool = [["Tavuk Döner", "Et Döner"], ["Çay", "Kahve"], ["Messi", "Ronaldo"], ["Instagram", "TikTok"], ["Boyoz", "Gevrek"], ["Lahmacun", "Pide"]];

    function connect() {
        myName = document.getElementById('nameInput').value.trim();
        myRoom = document.getElementById('roomInput').value.trim();

        if (!myName || !myRoom) return alert("Bilgileri doldurun!");

        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('room-ui').classList.remove('hidden');
        document.getElementById('room-id').innerText = myRoom;

        // Odaya gir ve temizlik yap
        const playerRef = db.ref(`rooms/${myRoom}/players/${myName}`);
        playerRef.set({ name: myName });
        playerRef.onDisconnect().remove();

        // Oyuncu listesini anlık çek
        db.ref(`rooms/${myRoom}/players`).on('value', (snap) => {
            const data = snap.val();
            players = data ? Object.keys(data) : [];
            updateList();
        });

        // Oyun durumunu dinle
        db.ref(`rooms/${myRoom}/game`).on('value', (snap) => {
            const gameData = snap.val();
            if (gameData && gameData.status === 'active') {
                launchGame(gameData);
            }
        });
    }

    function updateList() {
        const listDiv = document.getElementById('player-list');
        listDiv.innerHTML = "<b>Oyuncular:</b>";
        players.forEach(p => {
            listDiv.innerHTML += `<div class="p-card">👤 &nbsp; ${p}</div>`;
        });

        // Başlatma yetkisi (Listede ilk olan kişiye verilir)
        if (players[0] === myName && players.length >= 2) {
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('status-text').innerText = "Oyun hazır!";
        }
    }

    function sendGameStart() {
        const pair = pool[Math.floor(Math.random() * pool.length)];
        const spy = players[Math.floor(Math.random() * players.length)];

        db.ref(`rooms/${myRoom}/game`).set({
            status: 'active',
            words: pair,
            spy: spy,
            trigger: Date.now()
        });
    }

    function launchGame(data) {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        
        const isSpy = (myName === data.spy);
        document.getElementById('role-text').innerText = isSpy ? "KÖSTEBEKSİN!" : "SİVİLSİN";
        document.getElementById('role-text').style.color = isSpy ? "#ff4d4d" : "#ffd700";
        document.getElementById('word-display').innerText = isSpy ? data.words[1] : data.words[0];
    }
</script>
</body>
</html>
